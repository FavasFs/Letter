<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Islamic Wedding Card Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Amiri:ital,wght@0,400;0,700;1,400&family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#c9a84c;--gold2:#e8c96a;--gold3:#a07830;
  --cream:#fdf8f0;--ivory:#f8f2e4;
}
body{
  background:#1a1208;
  font-family:'Cormorant Garamond',serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* ─── GALLERY ─── */
.gallery-bg{
  background: radial-gradient(ellipse at 50% 20%, #2d1f08 0%, #120d04 60%, #0a0800 100%);
  min-height:100vh;
  padding:40px 20px 60px;
}
.gallery-title{
  text-align:center;
  color:var(--gold2);
  font-family:'Cinzel',serif;
  font-size:clamp(22px,4vw,38px);
  letter-spacing:6px;
  margin-bottom:6px;
  animation:fadeDown 1s ease;
}
.gallery-sub{
  text-align:center;
  color:#a08040;
  font-family:'Amiri',serif;
  font-size:18px;
  letter-spacing:3px;
  margin-bottom:40px;
  animation:fadeDown 1.2s ease;
}
.gallery-line{
  display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:40px;
}
.gallery-line span{color:var(--gold);font-size:22px;}
.gallery-line hr{width:100px;border:none;border-top:1px solid #a0804055;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:24px;
  max-width:1100px;
  margin:0 auto;
}
.thumb{
  aspect-ratio:3/4;
  border-radius:8px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
  border:1px solid #a0804033;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1), box-shadow .35s ease;
  animation:fadeUp .7s ease both;
}
.thumb:nth-child(1){animation-delay:.05s}
.thumb:nth-child(2){animation-delay:.1s}
.thumb:nth-child(3){animation-delay:.15s}
.thumb:nth-child(4){animation-delay:.2s}
.thumb:nth-child(5){animation-delay:.25s}
.thumb:nth-child(6){animation-delay:.3s}
.thumb:nth-child(7){animation-delay:.35s}
.thumb:nth-child(8){animation-delay:.4s}
.thumb:nth-child(9){animation-delay:.45s}
.thumb:nth-child(10){animation-delay:.5s}
.thumb:hover{
  transform:translateY(-8px) scale(1.02);
  box-shadow:0 20px 50px rgba(180,130,30,.25);
  border-color:#a0804066;
}
.thumb svg{width:100%;height:100%;}
.thumb-label{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(10,6,0,.85));
  color:var(--gold2);
  font-family:'Cinzel',serif;
  font-size:10px;letter-spacing:2px;
  text-align:center;padding:20px 8px 10px;
  opacity:0;transition:opacity .3s;
}
.thumb:hover .thumb-label{opacity:1;}

/* ─── MODAL ─── */
.modal{
  display:none;position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,.92);
  align-items:center;justify-content:center;
  animation:none;
}
.modal.active{display:flex;}
.modal-inner{
  position:relative;
  width:min(420px,90vw);
  height:min(560px,90vh);
  animation:popIn .45s cubic-bezier(.34,1.56,.64,1);
}
.modal-close{
  position:fixed;top:24px;right:28px;
  background:none;border:1px solid #a0804066;
  color:var(--gold2);font-size:22px;width:42px;height:42px;
  border-radius:50%;cursor:pointer;z-index:1001;
  display:flex;align-items:center;justify-content:center;
  transition:all .25s;font-family:sans-serif;
}
.modal-close:hover{background:#a0804033;transform:scale(1.1);}
.card-view{width:100%;height:100%;border-radius:12px;overflow:hidden;position:relative;}

/* ─── ANIMATIONS ─── */
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}
@keyframes popIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes spinSlow{to{transform:rotate(360deg)}}
@keyframes spinRev{to{transform:rotate(-360deg)}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes shimmer{0%{stop-color:#c9a84c}50%{stop-color:#f0d882}100%{stop-color:#c9a84c}}
@keyframes drawIn{from{stroke-dashoffset:1000}to{stroke-dashoffset:0}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}
@keyframes twinkle{0%,100%{opacity:.3;r:1.5}50%{opacity:1;r:2.5}}
@keyframes petals{0%{transform:rotate(0deg) scale(1)}50%{transform:rotate(180deg) scale(1.05)}100%{transform:rotate(360deg) scale(1)}}
@keyframes ripple{0%{r:5;opacity:.8}100%{r:35;opacity:0}}
@keyframes starRotate{to{transform:rotate(360deg)}}
@keyframes borderDash{to{stroke-dashoffset:-40}}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 2px #c9a84c44)}50%{filter:drop-shadow(0 0 8px #c9a84c99)}}

/* ─── CARD THEMES (inline SVG animations) ─── */
.star-spin{animation:spin 20s linear infinite;transform-origin:center;}
.star-rev{animation:spinRev 15s linear infinite;transform-origin:center;}
.float{animation:floatUp 4s ease-in-out infinite;}
.pulse-anim{animation:pulse 3s ease-in-out infinite;}
.draw-in{stroke-dasharray:1000;animation:drawIn 3s ease forwards;}
.glow-anim{animation:glow 2.5s ease-in-out infinite;}
</style>
</head>
<body>

  <h1 class="gallery-title">Islamic Wedding Cards</h1>
  <p class="gallery-sub">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</p>
  <div class="gallery-line"><hr><span>✦</span><hr></div>

  <div class="grid" id="grid"></div>

<div class="modal" id="modal">
  <button class="modal-close" onclick="closeModal()">✕</button>
  <div class="modal-inner">
    <div class="card-view" id="cardView"></div>
  </div>

// ══════════════════════════════════════════════
// BUILD GALLERY
// ══════════════════════════════════════════════
const grid = document.getElementById('grid');
cards.forEach((card,i)=>{
  const div = document.createElement('div');
  div.className='thumb';
  div.style.background=card.bg;
  div.innerHTML = card.render(i+'s',true) + `<div class="thumb-label">${card.label}</div>`;
  div.onclick=()=>openModal(i);
  grid.appendChild(div);
});

// ══════════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════════
function openModal(i){
  const modal=document.getElementById('modal');
  const view=document.getElementById('cardView');
  const card=cards[i];
  view.style.background=card.bg;
  view.innerHTML=card.render(i+'m',false);
  modal.classList.add('active');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('modal').classList.remove('active');
  document.body.style.overflow='';
}
document.getElementById('modal').addEventListener('click',function(e){
  if(e.target===this)closeModal();
});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
</script>
